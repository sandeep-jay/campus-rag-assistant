# CI — lint and unit tests (tox). Callable from CD on qa/release.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, qa, release]
  workflow_call:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: tox (lint, backend, frontends)
    runs-on: ubuntu-22.04
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot
      POSTGRES_DB: chatbot_test
      PGPASSWORD: postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            tox.ini

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: frontend-vue/.nvmrc
          cache: npm
          cache-dependency-path: frontend-vue/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install tox
          pip install -r requirements.txt

      - name: Bootstrap PostgreSQL (test DB + role)
        run: |
          psql -h localhost -U postgres -c "CREATE DATABASE chatbot_test;"
          psql -h localhost -U postgres -d chatbot_test -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"
          psql -h localhost -U postgres -d chatbot_test -c \
            "CREATE ROLE chatbot WITH SUPERUSER LOGIN PASSWORD 'chatbot';"
          psql -h localhost -U postgres -d chatbot_test -c \
            "ALTER SCHEMA public OWNER TO chatbot;"

      - name: Run tox
        run: tox -e lint,backend,frontend-streamlit,frontend-vue
