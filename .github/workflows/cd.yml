# CD — branch promotion builds and optional Elastic Beanstalk deploy.
# See docs/CI.md for secrets and branch flow (main → qa → release).
name: CD

on:
  push:
    branches: [qa, release]
  workflow_dispatch:
    inputs:
      target:
        description: Environment to build/deploy
        required: true
        type: choice
        options:
          - qa
          - release

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI gate
    uses: ./.github/workflows/ci.yml

  build-frontend:
    name: Build Vue SPA
    needs: ci
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: frontend-vue/.nvmrc
          cache: npm
          cache-dependency-path: frontend-vue/package-lock.json

      - name: Resolve API URL for environment
        id: api_url
        env:
          VITE_API_URL_QA: ${{ vars.VITE_API_URL_QA }}
          VITE_API_URL_RELEASE: ${{ vars.VITE_API_URL_RELEASE }}
        run: |
          if [ "${{ github.ref }}" = "refs/heads/release" ] || [ "${{ github.event.inputs.target }}" = "release" ]; then
            echo "url=${VITE_API_URL_RELEASE:-https://api.example.com}" >> "$GITHUB_OUTPUT"
          else
            echo "url=${VITE_API_URL_QA:-https://qa-api.example.com}" >> "$GITHUB_OUTPUT"
          fi

      - name: npm ci and build
        working-directory: frontend-vue
        env:
          VITE_API_URL: ${{ steps.api_url.outputs.url }}
        run: |
          HUSKY=0 npm ci
          npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: frontend-vue/dist
          retention-days: 14

  deploy-api:
    name: Deploy API (Elastic Beanstalk)
    needs: [ci, build-frontend]
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    if: vars.EB_DEPLOY_ENABLED == 'true'
    environment: ${{ github.ref == 'refs/heads/release' && 'production' || 'qa' }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve EB environment name
        id: eb_env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/release" ] || [ "${{ github.event.inputs.target }}" = "release" ]; then
            echo "name=${{ secrets.EB_ENVIRONMENT_NAME_RELEASE }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ secrets.EB_ENVIRONMENT_NAME_QA }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create deployment bundle
        run: |
          zip -r deploy.zip . \
            -x '*.git*' \
            -x 'frontend-vue/node_modules/*' \
            -x 'frontend-vue/dist/*' \
            -x 'venv/*' \
            -x '.venv/*' \
            -x '**/__pycache__/*' \
            -x 'backend_logs*.log' \
            -x '.env' \
            -x '.env.*'

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: ${{ secrets.EB_APPLICATION_NAME }}
          environment_name: ${{ steps.eb_env.outputs.name }}
          region: ${{ vars.AWS_REGION || 'us-west-2' }}
          version_label: ${{ github.sha }}
          deployment_package: deploy.zip
          use_existing_version_if_available: false
          wait_for_deployment: true

  ragas-gate:
    name: RAGAS quality gate (release only)
    needs: ci
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    if: >-
      (github.ref == 'refs/heads/release' || github.event.inputs.target == 'release') &&
      vars.RAGAS_QUALITY_GATE == '1'
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGPASSWORD: postgres
      POSTGRES_HOST: localhost
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot
      POSTGRES_DB: chatbot_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip tox
          pip install -r requirements.txt

      - name: Bootstrap PostgreSQL
        run: |
          psql -h localhost -U postgres -c "CREATE DATABASE chatbot_test;"
          psql -h localhost -U postgres -d chatbot_test -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"
          psql -h localhost -U postgres -d chatbot_test -c \
            "CREATE ROLE chatbot WITH SUPERUSER LOGIN PASSWORD 'chatbot';"
          psql -h localhost -U postgres -d chatbot_test -c \
            "ALTER SCHEMA public OWNER TO chatbot;"

      - name: Run RAGAS eval
        env:
          RAGAS_EVAL: "1"
        run: tox -e eval
