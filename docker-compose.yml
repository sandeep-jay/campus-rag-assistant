services:
  db:
    image: postgres:14
    restart: unless-stopped
    environment:
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot
      POSTGRES_DB: chatbot_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/001-init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbot -d chatbot_dev"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

volumes:
  pgdata:
