site_name: Campus RAG Assistant
site_description: Production-style RAG platform for governed campus knowledge
site_url: https://sandeep-jay.github.io/campus-rag-assistant/
repo_url: https://github.com/sandeep-jay/campus-rag-assistant
repo_name: sandeep-jay/campus-rag-assistant
edit_uri: edit/main/docs/

validation:
  nav:
    omitted_files: ignore
    not_found: ignore
    absolute_links: ignore
  links:
    not_found: ignore
    absolute_links: ignore
    unrecognized_links: ignore
    anchors: ignore

theme:
  name: material
  custom_dir: docs/overrides
  features:
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - .
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search

nav:
  - Start Here: index.md
  - Reviewer Guide: REVIEWER_GUIDE.md
  - Case Study: PORTFOLIO_CASE_STUDY.md
  - Architecture:
      - Overview: ARCHITECTURE.md
      - Design Notes: DESIGN.md
  - Helpdesk Agent:
      - Overview: helpdesk/index.md
      - Conversation Flow (product spec): roadmap/CONVERSATION_FLOW.md
      - Engineering Spec: roadmap/HELPDESK_AGENT.md
  - Evaluation:
      - Approach: EVALUATION.md
      - Baseline: eval_baseline_v2.md
  - Operations Manual:
      - Overview: operations-manual/index.md
      - Runbook and Observability: operations-manual/operations.md
      - CI/CD: operations-manual/ci-cd.md
      - Release: operations-manual/release.md
      - Security: operations-manual/security.md
      - Load Testing: operations-manual/load-testing.md
      - Production Hardening: operations-manual/production-hardening.md
  - Architecture Decisions:
      - Index: adr/README.md
      - ADR-001 — Provider registry: adr/ADR-001-provider-registry.md
      - ADR-002 — LangGraph vs chain: adr/ADR-002-langgraph-vs-chain.md
      - ADR-003 — Opt-in web research: adr/ADR-003-opt-in-web-research.md
      - ADR-004 — Eval gating policy: adr/ADR-004-eval-gating-policy.md
      - ADR-005 — Bounded helpdesk agent: adr/ADR-005-bounded-helpdesk-agent.md
      - ADR-006 — Live LLM supervisor migration: adr/ADR-006-live-llm-supervisor-migration.md
  - Roadmap:
      - Product Roadmap: roadmap/PRODUCT_ROADMAP.md
      - Agentic Helpdesk Rebuild: roadmap/AGENTIC_HELPDESK_REBUILD.md
  - Releases and Changelog:
      - Releases: release-notes/index.md
      - Changelog: changelog.md
  - About:
      - Notice: notice.md
      - License: license.md
      - Code on GitHub: https://github.com/sandeep-jay/campus-rag-assistant
