[tox]
minversion = 4.11.4
envlist = lint, backend, frontend-streamlit, frontend-vue
# Optional (not in default envlist): eval, e2e
isolated_build = True
skipsdist = True
verbosity = 3

[testenv]
passenv = *
deps =
    -r{toxinidir}/requirements.txt
commands =
    # Run setup first
    python -c "print('Running in environment: {envname}')"
    # We'll use specialized environments for tests

[testenv:backend]
description = Run backend tests
changedir = {toxinidir}/backend
setenv =
    PYTHONPATH = {toxinidir}
    APP_ENV = test
    RATE_LIMIT_ENABLED = false
deps =
    -r{toxinidir}/requirements.txt
    pytest>=8.0.0
    pytest-cov==4.1.0
    coverage==7.3.2
commands =
    python -m pytest tests -v --cov=app --cov-report=term-missing --no-cov-on-fail -m "not slow"

[testenv:frontend-streamlit]
description = Run Streamlit frontend tests
changedir = {toxinidir}/frontend-streamlit
setenv =
    PYTHONPATH = {toxinidir}
    APP_ENV = test
    RATE_LIMIT_ENABLED = false
deps =
    -r{toxinidir}/requirements.txt
    pytest>=8.0.0
    pytest-cov==4.1.0
    coverage==7.3.2
commands =
    python -m pytest tests -v --cov=app --cov-report=term-missing --no-cov-on-fail


[testenv:frontend-vue]
description = Run Vue typecheck, ESLint, and Vitest unit tests
changedir = {toxinidir}/frontend-vue
skip_install = true
deps =
    # node-only; do not install backend requirements.txt
allowlist_externals = npm
                      node
                      bash
commands =
    bash -c 'if [ "$CI" != "true" ] && [ -s "$HOME/.nvm/nvm.sh" ]; then . "$HOME/.nvm/nvm.sh" && nvm use; fi; HUSKY=0 npm ci && npm run typecheck && npm run lint && npm test'

[testenv:lint]
description = Run linting checks with ruff
deps =
    ruff==0.5.0
commands =
    ruff check {toxinidir}/backend {toxinidir}/frontend-streamlit
    ruff format --check {toxinidir}/backend {toxinidir}/frontend-streamlit

[testenv:format]
description = Format code with ruff
deps =
    ruff==0.5.0
commands =
    ruff format {toxinidir}/backend {toxinidir}/frontend-streamlit
    ruff check --fix {toxinidir}/backend {toxinidir}/frontend-streamlit

[testenv:eval]
passenv = *
description = RAGAS golden-dataset eval (slow; needs ragas + judge LLM keys in env)
changedir = {toxinidir}
setenv =
    PYTHONPATH = {toxinidir}
    APP_ENV = test
    RATE_LIMIT_ENABLED = false
    RAGAS_EVAL = 1
    RAGAS_DO_NOT_TRACK = true
    LOGGING_LEVEL = INFO
    LANGCHAIN_TRACING_V2 = false
    LANGSMITH_TRACING = false
deps =
    -r{toxinidir}/requirements.txt
    ragas>=0.2
commands =
    python -m pytest backend/tests/eval/ -v -s -m slow --log-cli-level=INFO {{posargs}}

[testenv:e2e]
description = Playwright E2E (API must be up at PLAYWRIGHT_API_BASE_URL, default http://127.0.0.1:8000)
changedir = {toxinidir}/frontend-vue
skip_install = true
allowlist_externals = npm
                      npx
                      node
                      bash
                      curl
commands_pre =
    curl -sf http://127.0.0.1:8000/api/health
commands =
    bash -c 'if [ "$CI" != "true" ] && [ -s "$HOME/.nvm/nvm.sh" ]; then . "$HOME/.nvm/nvm.sh" && nvm use; fi; HUSKY=0 npm ci && npx playwright install chromium webkit && npm run e2e'

